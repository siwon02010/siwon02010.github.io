<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background-color: #0b0d0f; /* Stark, realistic dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            color: #a0aab0; /* Muted, realistic terminal text color */
            overflow: hidden;
        }

        .container {
            text-align: left;
            width: 90%;
            max-width: 600px;
            border-left: 2px solid #2a2e33;
            padding-left: 20px;
        }

        .line {
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(5px);
            animation: fadeIn 0.4s forwards;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .line:nth-child(1) { animation-delay: 0.2s; }
        .line:nth-child(2) { animation-delay: 1.0s; }
        .line:nth-child(3) { animation-delay: 1.8s; }
        .line:nth-child(4) { animation-delay: 2.6s; color: #d94545; } /* Muted warning red */
        .line:nth-child(5) { animation-delay: 3.4s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background-color: #a0aab0;
            animation: blink 1s steps(2) infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            50.01%, 100% { opacity: 0; }
        }

        .terminated-screen {
            text-align: center;
            color: #3a3f44;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <!-- Content is injected by JavaScript based on visit status -->
    </div>

    <script>
        const container = document.getElementById('main-container');
        const VISIT_KEY = 'sys_terminal_executed';

        // Function to create a subtle, realistic system beep
        function systemBeep(frequency = 520, duration = 80, type = 'square') {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                // Very low volume for a realistic, subtle hardware feel
                gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration / 1000);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch (e) {
                console.log("Audio not supported or blocked.");
            }
        }

        // Check if the code has been run on this browser before
        if (localStorage.getItem(VISIT_KEY)) {
            // If already opened, show permanent lockout screen
            document.body.style.backgroundColor = '#050606';
            container.classList.add('terminated-screen');
            container.innerHTML = `
                <div>CONNECTION REFUSED</div>
                <div style="margin-top: 10px; font-size: 10px;">ENDPOINT DECOMMISSIONED</div>
            `;
        } else {
            // First time opening: Run the sequence
            container.innerHTML = `
                <div class="line">> INITIALIZING SECURE SHELL...</div>
                <div class="line">> AUTHENTICATING DEVICE ID...</div>
                <div class="line">> DECRYPTING SESSION PAYLOAD...</div>
                <div class="line">> WARNING: SESSION IS SET TO SELF-TERMINATE.</div>
                <div class="line">> TERMINATING CONNECTION<span class="cursor"></span></div>
            `;

            // Play a sequence of realistic beeps
            setTimeout(() => systemBeep(440, 50, 'sine'), 200);   // Initiate sound
            setTimeout(() => systemBeep(330, 100, 'square'), 2600); // Warning sound
            setTimeout(() => systemBeep(220, 200, 'sawtooth'), 3400); // Shutdown sound

            // After 4.5 seconds, terminate the session
            setTimeout(() => {
                // Set the flag so it never opens normally again
                localStorage.setItem(VISIT_KEY, 'true');
                
                // Replace content with a dead screen
                document.body.style.backgroundColor = '#050606';
                container.classList.add('terminated-screen');
                container.innerHTML = `
                    <div>SESSION TERMINATED</div>
                    <div style="margin-top: 10px; font-size: 10px;">FURTHER ACCESS REVOKED</div>
                `;
            }, 4500);
        }
    </script>
</body>
</html>
