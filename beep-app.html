<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beep App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #ffffff;
        }
        
        .container {
            text-align: center;
        }
        
        .exit-message {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="exit-message">Exiting in 3 seconds...</div>
    </div>

    <script>
        // Function to create a beep sound using Web Audio API
        function beep(frequency = 440, duration = 200) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }
        
        // Play beep sound
        beep(440, 200);
        
        // Exit after 3 seconds
        setTimeout(() => {
            // Close the window/tab
            window.close();
            // Fallback: navigate away if close doesn't work
            if (!window.closed) {
                window.location.href = 'about:blank';
            }
        }, 3000);
    </script>
</body>
</html>
